<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPal — AI Study Assistant | MATHSIMIZED</title>
  <meta property="og:title" content="StudyPal — AI Study Assistant | MATHSIMIZED">
  <meta property="og:description" content="Your AI-powered study assistant for mathematics. Chat, upload images, and analyze documents.">
  <meta property="og:image" content="https://mathsimized.com/logo-v2.png">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>∑</text></svg>">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" defer></script>
  <script src="./firebase.js" defer></script>
  <script src="./studypal.js" defer></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .chat-page {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 72px);
      padding-top: 72px;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header h2 {
      font-size: 1.1rem;
      margin: 0;
      white-space: nowrap;
    }

    .chat-header h2 span { color: var(--primary); }

    .chat-header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chat-header-controls select {
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      outline: none;
      max-width: 200px;
    }

    .chat-header-controls select:focus {
      border-color: var(--primary);
    }

    .chat-header-controls select optgroup {
      background: var(--surface);
      color: var(--muted);
      font-size: 0.8rem;
    }

    .chat-header-controls select option {
      background: var(--surface);
      color: var(--text);
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .btn-icon:hover {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages:empty {
      display: none;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .message.assistant .message-avatar {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      max-width: 85%;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .message.user .message-bubble {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-bubble {
      border-bottom-left-radius: 4px;
    }

    .message-content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content p {
      margin-bottom: 8px;
    }

    .message-content p:last-child {
      margin-bottom: 0;
    }

    .message-content code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .message-content pre {
      background: var(--surface2);
      padding: 12px 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border);
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }

    .chat-input-area {
      flex-shrink: 0;
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .chat-input-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input-wrapper {
      flex: 1;
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      align-items: flex-end;
      transition: border-color 0.3s;
    }

    .chat-input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .chat-input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 12px 8px 12px 16px;
      resize: none;
      min-height: 24px;
      max-height: 150px;
      line-height: 1.5;
    }

    .chat-input-wrapper textarea::placeholder {
      color: var(--muted);
    }

    .input-tools {
      display: flex;
      gap: 2px;
      padding: 4px 4px 4px 0;
    }

    .input-tools .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1rem;
    }

    .input-tools .btn-icon:hover {
      color: var(--primary);
      box-shadow: none;
      border: none;
    }

    .chat-input-area .btn-primary {
      padding: 10px 18px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .chat-input-area .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #imagePreviewContainer {
      max-width: 800px;
      margin: 0 auto 8px;
      display: none;
    }

    .image-preview-box {
      position: relative;
      display: inline-block;
    }

    .image-preview-box img {
      max-height: 150px;
      border-radius: 10px;
      border: 2px solid var(--primary);
    }

    .image-preview-box .remove-image {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    .history-sidebar {
      position: fixed;
      top: 72px;
      left: -300px;
      width: 300px;
      height: calc(100vh - 72px);
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 900;
      transition: left 0.3s ease;
      padding: 16px;
      overflow-y: auto;
    }

    .history-sidebar.open {
      left: 0;
    }

    .history-sidebar h3 {
      font-size: 0.95rem;
      margin-bottom: 16px;
      color: var(--muted2);
    }

    @media (max-width: 768px) {
      .chat-page {
        height: calc(100vh - 56px);
        padding-top: 56px;
      }

      .chat-header {
        padding: 10px 16px;
        flex-wrap: wrap;
      }

      .chat-header h2 { font-size: 1rem; }

      .chat-header-controls select {
        max-width: 140px;
        font-size: 0.8rem;
      }

      .chat-messages {
        padding: 16px;
      }

      .message-bubble {
        max-width: 90%;
        font-size: 0.9rem;
        padding: 12px 14px;
      }

      .chat-input-area {
        padding: 12px 16px;
      }

      .history-sidebar {
        width: 260px;
      }
    }

    @media (max-width: 480px) {
      .chat-header h2 { font-size: 0.9rem; }

      .chat-header-controls select {
        max-width: 110px;
        font-size: 0.75rem;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="./index.html" class="navbar-logo"><img src="./logo-v2.png" alt="MATHSIMIZED" height="32"></a>
    <button class="hamburger" onclick="toggleMobileMenu()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./about.html">About</a></li>
      <li class="dropdown">
        <a href="#">Resources ▾</a>
        <div class="dropdown-menu">
          <a href="./lectures.html">Lectures</a>
          <a href="./notes.html">Notes</a>
          <a href="./pastpapers.html">Past Papers</a>
        </div>
      </li>
      <li><a href="./news.html">News</a></li>
      <li class="dropdown">
        <a href="#">Games ▾</a>
        <div class="dropdown-menu">
          <a href="./games.html">Play Games</a>
          <a href="./leaderboard.html">Leaderboard</a>
          <a href="./competitions.html">Competitions</a>
        </div>
      </li>
      <li><a href="./contact.html">Contact</a></li>
    </ul>
    <div class="nav-auth" id="navAuth"></div>
  </div>
</nav>

<div id="historySidebar" class="history-sidebar">
  <h3>History</h3>
  <p style="color:var(--muted);font-size:0.85rem;">Session history will appear here.</p>
</div>

<div class="chat-page">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-icon" onclick="toggleSidebar()" title="History">☰</button>
      <h2>Study<span>Pal</span></h2>
    </div>
    <div class="chat-header-controls">
      <select id="modelSelect">
        <option>Loading models...</option>
      </select>
      <button class="btn-icon" onclick="clearChat()" title="Clear conversation">✕</button>
    </div>
  </div>

  <div id="chatContainer" style="flex:1;display:flex;flex-direction:column;">
    <div id="chatMessages" class="chat-messages"></div>

    <div id="chatInputArea" class="chat-input-area">
      <div id="imagePreviewContainer">
        <div class="image-preview-box">
          <div id="imagePreview"></div>
          <button class="remove-image" onclick="removeImage()">✕</button>
        </div>
      </div>

      <div class="chat-input-inner">
        <div class="chat-input-wrapper">
          <textarea id="chatInput" placeholder="Ask a math question..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px'"></textarea>
          <div class="input-tools">
            <button class="btn-icon" id="graphBtn" title="Generate graph">📈</button>
            <button class="btn-icon" id="imageBtn" title="Upload image">🖼</button>
            <button class="btn-icon" id="fileBtn" title="Upload document">📄</button>
          </div>
        </div>
        <button id="sendBtn" class="btn btn-primary" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">
<input type="file" id="fileInput" accept=".pdf,.txt,.md,.csv,.json" style="display:none">

<script>
function toggleMobileMenu() {
  document.getElementById('navLinks').classList.toggle('open');
  document.getElementById('navAuth').classList.toggle('open');
}
</script>

</body>
</html>
